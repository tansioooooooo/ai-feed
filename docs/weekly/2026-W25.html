<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI トレンドレポート 2026-W25</title>
<style>:root {
  --bg: #0f0f13;
  --surface: #1a1a22;
  --border: #2a2a38;
  --text: #e8e8f0;
  --muted: #7a7a9a;
  --accent: #7c6af7;
  --green: #4ade80;
  --orange: #fb923c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 14px;
  line-height: 1.6;
}
header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
}
.header-top {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 4px;
}
h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
h1 a { color: var(--text); text-decoration: none; }
h1 a:hover { color: var(--accent); }
.subtitle { font-size: 14px; color: var(--muted); }
.period-badge {
  display: inline-block;
  background: var(--accent);
  color: white;
  border-radius: 6px;
  padding: 2px 10px;
  font-size: 12px;
  font-weight: 600;
}
main { padding: 20px 24px; max-width: 860px; }
section { margin-bottom: 28px; }
section h2 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 14px;
  color: var(--text);
  border-left: 3px solid var(--accent);
  padding-left: 10px;
}
.summary-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  line-height: 1.8;
  color: var(--text);
}
.trends-list { display: flex; flex-direction: column; gap: 12px; }
.trend-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.trend-title {
  font-weight: 600;
  font-size: 14px;
  color: var(--accent);
  margin-bottom: 6px;
}
.trend-desc { color: var(--text); line-height: 1.7; }
.keywords { display: flex; flex-wrap: wrap; gap: 8px; }
.keyword {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 12px;
  color: var(--text);
}
.outlook-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--green);
  border-radius: 10px;
  padding: 16px 20px;
  line-height: 1.8;
}
.articles-grid { display: flex; flex-direction: column; gap: 8px; }
.article-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.article-source {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
}
.article-link {
  color: var(--text);
  text-decoration: none;
  font-size: 13px;
  line-height: 1.4;
}
.article-link:hover { color: var(--accent); }
.article-score { color: var(--muted); font-size: 11px; white-space: nowrap; flex-shrink: 0; }
.back-link {
  display: inline-block;
  color: var(--accent);
  text-decoration: none;
  font-size: 13px;
  margin-bottom: 16px;
}
.back-link:hover { text-decoration: underline; }
.stats-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  text-align: center;
  min-width: 80px;
}
.stat-num { font-size: 22px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
@media (max-width: 600px) {
  header, main { padding-left: 16px; padding-right: 16px; }
}</style>
</head>
<body>
<header>
  <div class="header-top">
    <h1><a href="../index.html">AI Feed</a></h1>
    <span class="period-badge">週次レポート</span>
    <span class="subtitle">2026-W25 (2026-06-15 〜 2026-06-21)</span>
  </div>
</header>
<main>
  <a href="../index.html" class="back-link">&larr; 最新フィードへ</a>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-num">0</div><div class="stat-label">総記事数</div></div>
    <div class="stat-box"><div class="stat-num">0</div><div class="stat-label">HN</div></div>
    <div class="stat-box"><div class="stat-num">0</div><div class="stat-label">Hatena</div></div>
    <div class="stat-box"><div class="stat-num">0</div><div class="stat-label">Twitter</div></div>
  </div>

  <section>
    <h2>📋 週次サマリー</h2>
    <div class="summary-box">2026-W25 のAIトレンドレポートです。</div>
  </section>

  <section>
    <h2>🔥 主要トレンド</h2>
    <div class="trends-list"></div>
  </section>

  <section>
    <h2>💡 注目キーワード</h2>
    <div class="keywords"></div>
  </section>

  <section>
    <h2>🟠 HN ランキング TOP0</h2>
    <div class="articles-grid"><p style="color:var(--muted)">記事なし</p></div>
  </section>

  <section>
    <h2>🔵 はてな ランキング TOP0</h2>
    <div class="articles-grid"><p style="color:var(--muted)">記事なし</p></div>
  </section>

  <section>
    <h2>🌅 展望</h2>
    <div class="outlook-box"></div>
  </section>
</main>
</body>
</html>
