name: Update AI Feed

on:
  schedule:
    # 毎日 4:00 と 16:00 JST (= 19:00 と 7:00 UTC)
    - cron: "0 19,7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch feeds
        run: python scripts/fetch_feeds.py

      - name: Classify with Claude (structured output)
        id: claude_classify
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            docs/feed.json を読んで、以下の2つのタスクを実行してください。

            ## タスク1: AI関連性の判定

            判定基準:
            - 含める: LLM/生成AI/機械学習モデル/AIツール/AI企業動向/AI研究
            - 除く: 一般的なソフトウェア開発・Web技術（AI要素がないもの）・政治・スポーツ等

            - hackernews と hatena の各アイテムを判定する
            - twitter は全件 true とする（監視アカウントがAI関連のため）

            ## タスク2: HNタイトルの日本語翻訳

            hackernews の各アイテムの title を自然な日本語に翻訳してください。
            - 技術用語・固有名詞はそのまま残す（例: "GPT-4", "OpenAI", "LLM"）
            - 簡潔で読みやすい日本語にする

            ## 手順
            1. docs/feed.json を Read tool で読み込む
            2. 判定と翻訳を行う
            3. ファイルを変更しないでください。結果を構造化出力として返してください。

            ## 出力形式
            - hackernews: 各アイテムの {relevant: bool, title_ja: string} の配列
            - hatena: 各アイテムの true/false の配列
            - twitter: 各アイテムの true/false の配列（全件 true）
          allowed_tools: "Read"
          claude_args: "--json-schema '{\"type\":\"object\",\"properties\":{\"hackernews\":{\"type\":\"array\",\"items\":{\"type\":\"object\",\"properties\":{\"relevant\":{\"type\":\"boolean\"},\"title_ja\":{\"type\":\"string\"}},\"required\":[\"relevant\",\"title_ja\"]}},\"hatena\":{\"type\":\"array\",\"items\":{\"type\":\"boolean\"}},\"twitter\":{\"type\":\"array\",\"items\":{\"type\":\"boolean\"}}},\"required\":[\"hackernews\",\"hatena\",\"twitter\"]}'"

      - name: Merge classification and generate HTML
        run: |
          python scripts/merge_classification.py '${{ steps.claude_classify.outputs.structured_output }}'

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update feed $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
