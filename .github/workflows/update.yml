name: Update AI Feed

on:
  schedule:
    # 毎日 9:00 と 21:00 JST (= 0:00 と 12:00 UTC)
    - cron: "0 0,12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch feeds
        run: python scripts/fetch_feeds.py

      - name: Classify with Claude (structured output)
        id: claude_classify
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            docs/feed.json を読んで、各記事がAI・LLM・機械学習に関連するか判定してください。

            判定基準:
            - 含める: LLM/生成AI/機械学習モデル/AIツール/AI企業動向/AI研究
            - 除く: 一般的なソフトウェア開発・Web技術（AI要素がないもの）・政治・スポーツ等

            手順:
            1. docs/feed.json を Read tool で読み込む
            2. hackernews と hatena の各アイテムを判定する
            3. twitter は全件 true とする（監視アカウントがAI関連のため）
            4. ファイルを変更しないでください。結果を構造化出力として返してください。

            出力形式:
            - hackernews: 各アイテムのインデックス(0始まり)順に true/false の配列
            - hatena: 各アイテムのインデックス(0始まり)順に true/false の配列
            - twitter: 各アイテムのインデックス(0始まり)順に true/false の配列（全件 true）
          allowed_tools: "Read"
          claude_args: "--json-schema '{\"type\":\"object\",\"properties\":{\"hackernews\":{\"type\":\"array\",\"items\":{\"type\":\"boolean\"}},\"hatena\":{\"type\":\"array\",\"items\":{\"type\":\"boolean\"}},\"twitter\":{\"type\":\"array\",\"items\":{\"type\":\"boolean\"}}},\"required\":[\"hackernews\",\"hatena\",\"twitter\"]}'"

      - name: Merge classification and generate HTML
        run: |
          python scripts/merge_classification.py '${{ steps.claude_classify.outputs.structured_output }}'

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update feed $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
